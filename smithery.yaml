# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - syncroApiKey
      - syncroSubdomain
    properties:
      syncroApiKey:
        type: string
        description: Your Syncro API key
      syncroSubdomain:
        type: string
        description: Your Syncro subdomain
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { SYNCRO_API_KEY: config.syncroApiKey, SYNCRO_SUBDOMAIN: config.syncroSubdomain, MCP_TRANSPORT: 'stdio' } })
