version: 2
registries:
  wyre-ghpkg:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.GHPKG_READ_TOKEN}}
updates:
  - package-ecosystem: "npm"
    directory: "/"
    registries:
      - wyre-ghpkg
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      # Bundle all non-major npm updates into a single PR to cut noise.
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
